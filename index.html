<!DOCTYPE html>
<html>
<head>
<title>Tcodetech Game</title>

<style>
body {
  margin: 0;
  background: #666;
  text-align: center;
  font-family: Arial;
  color: white;
}

/* TOP BAR */
#topBar {
  display: flex;
  justify-content: space-between;
  padding: 10px 30px;
  font-size: 20px;
}

/* BUTTON */
#pauseBtn {
  padding: 5px 15px;
  cursor: pointer;
  background: black;
  color: white;
  border: none;
}

/* GAME AREA */
#gameArea {
  margin-top: 50px;
}

/* 🔵 BAR */
#line {
  width: 340px;
  height: 10px;
  background: cyan;
  margin: 100px auto 20px;
}

/* 🎨 BLOCKS */
#blocks {
  display: flex;
  justify-content: center;
  margin-bottom: 20px;
}

.block {
  width: 85px;
  height: 50px;
  cursor: pointer;
}

.selected {
  outline: 4px solid white;
}

/* BALL */
.ball {
  width: 18px;
  height: 18px;
  border-radius: 50%;
  position: absolute;
}

/* ⭐ LEADERBOARD */
#leaderboard {
  background: #222;
  padding: 15px 25px;
  border-radius: 12px;
  width: fit-content;
  margin: 20px auto;
}

table {
  border-collapse: collapse;
}

td {
  padding: 6px 20px;
}
</style>

</head>

<body>

<div id="topBar">
  <div>Score: <span id="score">0</span></div>
  <div>High Score: <span id="highScore">0</span></div>
  <button id="pauseBtn">Pause</button>
</div>

<div id="gameArea">

  <div id="line"></div>

  <div id="blocks">
    <div class="block" style="background: yellow;"></div>
    <div class="block" style="background: cyan;"></div>
    <div class="block" style="background: green;"></div>
    <div class="block" style="background: pink;"></div>
  </div>

  <!-- ⭐ LEADERBOARD BELOW -->
  <div id="leaderboard">
    <h3>Leaderboard</h3>
    <table>
      <tr><td>🇮🇳 Ravi</td><td>25</td></tr>
      <tr><td>🇺🇸 John</td><td>20</td></tr>
      <tr><td>🇯🇵 Ken</td><td>15</td></tr>
    </table>
  </div>

</div>

<script>
let colors = ["yellow","cyan","green","pink"];
let selected = 0;
let score = 0;
let highScore = localStorage.getItem("highScore") || 0;
let paused = false;

const blocks = document.querySelectorAll(".block");
const line = document.getElementById("line");

document.getElementById("highScore").innerText = highScore;

updateSelection();

// CLICK SELECT
blocks.forEach((block, index) => {
  block.addEventListener("click", () => {
    selected = index;
    updateSelection();
  });
});

function updateSelection() {
  blocks.forEach(b => b.classList.remove("selected"));
  blocks[selected].classList.add("selected");
  line.style.background = colors[selected];
}

// SPEED
function getSpeed() {
  if (score < 5) return 3;
  if (score < 15) return 6;
  return 10;
}

// PAUSE
document.getElementById("pauseBtn").onclick = () => {
  paused = !paused;
  document.getElementById("pauseBtn").innerText = paused ? "Resume" : "Pause";
};

// BALL
function createBall() {
  if (paused) return;

  let ball = document.createElement("div");
  let colorIndex = Math.floor(Math.random() * 4);

  ball.classList.add("ball");
  ball.style.background = colors[colorIndex];

  let rect = line.getBoundingClientRect();
  let x = Math.random() * (rect.width - 20) + rect.left;

  ball.style.left = x + "px";
  ball.style.top = "0px";

  document.body.appendChild(ball);

  let fall = setInterval(() => {
    if (paused) return;

    let top = parseInt(ball.style.top);
    ball.style.top = top + getSpeed() + "px";

    if (top >= rect.top - 10) {
      clearInterval(fall);

      if (colorIndex === selected) {
        score++;
        document.getElementById("score").innerText = score;

        if (score > highScore) {
          highScore = score;
          localStorage.setItem("highScore", highScore);
          document.getElementById("highScore").innerText = highScore;
        }

        ball.remove();
      } else {
        alert("Game Over! Score: " + score);
        location.reload();
      }
    }
  }, 20);
}

setInterval(createBall, 800);
</script>

</body>
</html>
